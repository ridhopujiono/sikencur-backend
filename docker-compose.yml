services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: kencur_app
    restart: unless-stopped
    working_dir: /var/www
    depends_on:
      - mysql
      - redis
    volumes:
      - ./:/var/www
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - kencur_network

  nginx:
    image: nginx:alpine
    container_name: kencur_app_nginx
    restart: unless-stopped
    ports:
      - "8004:80"
    depends_on:
      - app
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - kencur_network

  mysql:
    image: mysql:8.0
    container_name: kencur_app_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - kencur_network

  redis:
    image: redis:7-alpine
    container_name: kencur_app_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - kencur_network

  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: kencur_app_horizon
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan horizon
    depends_on:
      - app
      - mysql
      - redis
    volumes:
      - ./:/var/www
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - kencur_network

volumes:
  mysql_data:
  redis_data:

networks:
  kencur_network:
    driver: bridge
